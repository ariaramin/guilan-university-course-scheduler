name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Validate Version
        id: validate_version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PACKAGE_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('./package.json', 'utf8')).version")
          MANIFEST_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('./extension/manifest.json', 'utf8')).version")

          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ] && [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Error: Tag version (v$TAG_VERSION) does not match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi

          if [ "$PACKAGE_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Error: package.json version ($PACKAGE_VERSION) does not match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi

          echo "VERSION=$MANIFEST_VERSION" >> $GITHUB_ENV

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        env:
          TZ: UTC
        run: npm test

      - name: Build Extension Artifact
        run: |
          # Create a ZIP file of the extension folder excluding unnecessary files if any
          cd extension
          zip -r ../guilan-course-planner-v${{ env.VERSION }}.zip . -x "*.DS_Store*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: guilan-course-planner-v${{ env.VERSION }}.zip
