name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        env:
          TZ: UTC
        run: npm test

      - name: Verify Extension Output and Version
        run: |
          if [ ! -f "extension/manifest.json" ]; then
            echo "Error: extension/manifest.json not found."
            exit 1
          fi

          for asset in "background.js" "content.js" "dashboard.html" "assets/icon-16.png" "assets/icon-32.png" "assets/icon-48.png" "assets/icon-128.png"; do
            if [ ! -f "extension/$asset" ]; then
              echo "Error: extension/$asset not found."
              exit 1
            fi
          done

          PACKAGE_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('./package.json', 'utf8')).version")
          MANIFEST_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('./extension/manifest.json', 'utf8')).version")

          if [ "$PACKAGE_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Error: package.json version ($PACKAGE_VERSION) does not match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi

          echo "Verified manifest and package version: $MANIFEST_VERSION"

