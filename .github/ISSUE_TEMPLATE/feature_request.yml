name: درخواست قابلیت جدید
description: پیشنهاد یک ایده یا قابلیت تازه برای بهینه‌سازی افزونه
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: مشکل فعلی (Problem Statement)
      description: چالش یا مشکل فعلی که ناشی از عدم وجود این قابلیت است را بنویسید.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: قابلیت پیشنهادی (Proposed Solution)
      description: تغییر پیشنهادی چیست و چگونه باید عمل کند؟
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: ارزش برای کاربران (User Value)
      description: این قابلیت چه ارزشی ایجاد می‌کند و چقدر فرآیند انتخاب واحد را آسان‌تر می‌سازد؟
    validations:
      required: true
