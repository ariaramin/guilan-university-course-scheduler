name: گزارش خطا
description: ثبت یک خطای فنی جهت بررسی و برطرف کردن در افزونه
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **توجه حریم خصوصی:** لطفاً از ارسال رمز عبور، اطلاعات هویتی (شماره دانشجویی/کد ملی)، نشست‌ها (Session Tokens) و اطلاعات خصوصی خودداری کنید.
  - type: input
    id: version
    attributes:
      label: نسخه افزونه (Extension Version)
      description: نسخه فعلی افزونه (مانند 1.0.0)
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: مرورگر و نسخه (Browser Version)
      description: نام و نسخه مرورگر (مانند Chrome 126)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: سیستم‌عامل (Operating System)
      description: سیستم‌عامل شما (مانند Windows 11 یا macOS)
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: مراحل بازتولید (Reproduction Steps)
      description: مراحل بروز خطا را قدم به قدم توضیح دهید.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: نتیجه مورد انتظار (Expected Behavior)
      description: چه انتظاری داشتید رخ دهد؟
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: نتیجه واقعی (Actual Behavior)
      description: چه اتفاقی در عمل رخ داد؟
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: اسکرین‌شات یا لاگ (Screenshots / Logs)
      description: اسکرین‌شات یا لاگ‌های تشخیصی (بدون اطلاعات حساس) را وارد کنید.
